services:
  - type: web
    name: naver-sa-solution
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        generateValue: true
      - key: SITE_DOMAIN
        sync: false
      - key: NODE_ENV
        value: production
